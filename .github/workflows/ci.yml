name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: pytest (unit)
        run: uv run pytest -q -m "not integration"

  integration:
    runs-on: ubuntu-24.04
    services:
      valkey:
        image: valkey/valkey:8.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: pytest (integration)
        env:
          VALKEY_URL: valkey://127.0.0.1:6379
        # Exit code 5 from pytest means "no tests collected", which is the
        # expected state until the integration test file lands. Treat as
        # success so the job stays green while the suite is being built
        # up. Any real failure (1, 2, 3, 4) still fails the job.
        run: |
          set +e
          uv run pytest -q -m integration
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "no integration tests collected yet — treating as pass"
            exit 0
          fi
          exit $rc
