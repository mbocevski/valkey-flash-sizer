name: Release

# Publish to PyPI on `v*.*.*` tag push. Uses OIDC trusted publishing —
# no API tokens stored anywhere. The PyPI-side trusted-publisher config
# gates on owner + repo + workflow name + environment name, so all four
# must stay in sync with what was registered at pypi.org/manage/account/publishing.
on:
  push:
    tags:
      - 'v*.*.*'

# Never cancel a publish in flight — an interrupted PyPI upload can leave
# a half-registered version that blocks re-publish. Let it finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Verify tag matches pyproject version
        # Refuse to publish a tag whose version doesn't match the package
        # version — mismatches produce a release that's impossible to
        # reinstall (`pip install pkg==1.2.3` fetches something else).
        run: |
          set -eu
          tag_version="${GITHUB_REF_NAME#v}"
          file_version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$file_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME → version $tag_version but pyproject.toml says $file_version"
            exit 1
          fi
          echo "tag and pyproject agree on version $file_version"
      - name: Build
        run: uv build
      - name: Upload dist/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    # Pair the job with a GitHub environment so trusted-publishing on the
    # PyPI side can gate on the environment name. The URL shows up on the
    # Actions run summary so you can click straight through to PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/valkey-flash-sizer
    permissions:
      # Required for OIDC trusted publishing. No PyPI API token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d  # v1.14.0
